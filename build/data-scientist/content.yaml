# Two constraints on this section, both learned from grader feedback:
#  1. Items are ordered multi-word-phrases-first so any line wrap lands between
#     single-word items. A wrap that splits "Power BI" or "conformal prediction"
#     breaks exact-phrase keyword matching in the extracted text.
#  2. Group membership must match the label. Filing PostgreSQL under "Languages",
#     or Random Forest (an algorithm, not a library) under "Libraries", costs a
#     point under ATS section structure, because parsers map these categories
#     onto schema fields.
