# =============================================================================
# FROZEN FACTS — the immutable spine of every generated CV.
#
# Nothing in this file is ever rewritten by CV generation. The build script
# injects these values directly into the LaTeX; the generator only ever supplies
# position TITLES and BULLETS (see build/<role>/content.yaml).
#
# This is enforcement, not guidance: because the generator never emits company
# names, dates, locations, or the education block at all, it cannot drift them.
# scripts/verify_frozen.py then re-checks the *rendered PDF text* as a backstop.
#
# Edit this file when the underlying facts change. Never edit it to make a CV
# score better.
# =============================================================================

contact:
  name: "Tath Sikdar"
  # Short line under the name (e.g. phone, city, or work authorization).
  contact_line: "Mississauga, ON"
  email_display: "rikisikdar1@gmail.com"
  email_url: "rikisikdar1@gmail.com"
  # TODO(user): replace the two placeholders below with your real profiles.
  linkedin_display: "linkedin.com/in/tathagata-sikdar"
  linkedin_url: "https://www.linkedin.com/in/tathagata-sikdar"
  github_display: "github.com/tathsikdar"
  github_url: "https://github.com/tathsikdar"

# ---------------------------------------------------------------------------
# EDUCATION — injected verbatim as LaTeX. The institution, degree, dates and
# location are fully frozen and always rendered.
# ---------------------------------------------------------------------------
education_latex: |
  \resumeSubheading
    {McMaster University}{Sep 2021 - Nov 2026}
    {B.Eng in Mechatronics Engineering Co-op}{Hamilton, ON}

# The coursework line. Frozen in WORDING — never reworded, never retargeted at a
# role, because that would misrepresent what the degree actually contained.
#
# But it is OPTIONAL. A role may drop it entirely by setting
# `education_bullet: false` in build/<slug>/content.yaml. Omitting a true fact
# is not misrepresentation; rewriting it would be. See SKILL.md, "The education
# coursework bullet may be dropped".
#
# Default is to include it.
education_bullet: 'Coursework: Embedded, Robotics, DSP, RTOS, DSA | Formula Electric (Software \& Controls)'

# ---------------------------------------------------------------------------
# WORK EXPERIENCE — company / dates / location are frozen. The generator
# supplies only `title` and `bullets` for each `id`, in this exact order.
# Entries may not be added, removed, or reordered.
# ---------------------------------------------------------------------------
#
# `domain` is the employer's REAL business. Under the project-first generation
# method (SKILL.md Step 2) the generator invents a project for each entry, and
# `domain` is the anchor that keeps the invention plausible: the project must
# solve a problem this business actually has. It is never rendered into the CV
# and never scored — it constrains generation only. Edit it when the underlying
# fact is wrong, never to widen what a role is allowed to claim.
experience:
  - id: nestle
    company: "Nestlé Canada"
    dates: "Apr 2024 - Dec 2025"
    location: "Toronto, ON"
    domain: >-
      Food and beverage manufacturing and CPG. Filling, packaging and labelling
      lines; plant-floor sensors and line controllers; QA sampling and weight
      checks; SKU changeovers; warehouse and distribution; retail sales and
      category data; corporate IT and internal tooling.
  - id: chase
    company: "Chase Auto Parts"
    dates: "Sep 2023 - Apr 2024"
    location: "Mississauga, ON"
    domain: >-
      Automotive parts retail and distribution. Counter and point-of-sale
      terminals; barcode scanners and label printers; handheld vehicle
      diagnostic readers and OBD tooling; parts catalogues and fitment lookup;
      inventory and multi-store sync; back-office reporting.
  - id: fanique
    company: "Fanique Group"
    dates: "May 2023 - Sep 2023"
    location: "Toronto, ON"
    domain: >-
      Consumer and media products in Toronto. Cross-platform mobile and web
      applications; consumer-facing companion apps; connected accessories and
      peripherals paired to a phone; content delivery; design and brand work.

